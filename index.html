<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dog Sitting Finance</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://accounts.google.com/gsi/client"></script>
</head>
<body>

<!-- ══ HEADER ══════════════════════════════════════════════════ -->
<header class="header">
  <div class="header-left">
    <h1>Dog Sitting Finance</h1>
    <div class="year-wrap">
      <select id="year-select" class="year-select"></select>
      <span id="year-badge" class="year-badge hidden">View only</span>
    </div>
  </div>
  <div class="header-right">
    <button id="sync-btn" class="btn btn-secondary" disabled title="Pull data from Google Sheets">
      <span class="sync-icon">↻</span> Sync
    </button>
    <button id="add-btn" class="btn btn-primary">+ Add</button>
    <div id="auth-section">
      <button id="connect-btn" class="btn btn-google">Connect Sheets</button>
      <div id="auth-status" class="auth-status hidden">
        <span class="auth-dot connected"></span>
        <span>Connected</span>
        <button id="disconnect-btn" class="btn-link">Disconnect</button>
      </div>
    </div>
  </div>
</header>

<!-- Setup notice -->
<div id="setup-banner" class="setup-banner hidden">
  <strong>Setup needed:</strong> Fill in your Google Client ID in <code>js/config.js</code>.
  See <code>CLAUDE.md</code> for step-by-step instructions.
  <a href="#" id="setup-dismiss">×</a>
</div>

<!-- ══ TABS ════════════════════════════════════════════════════ -->
<nav class="tabs">
  <button class="tab active" data-tab="expenses">Expenses</button>
  <button class="tab" data-tab="income">Income</button>
</nav>

<!-- ══ MAIN ════════════════════════════════════════════════════ -->
<main class="main">

  <!-- ── EXPENSES tab ──────────────────────────────────────── -->
  <section id="tab-expenses" class="tab-content active">

    <div class="filter-bar">
      <div class="filter-group">
        <label>From</label>
        <input type="date" id="exp-from">
      </div>
      <div class="filter-group">
        <label>To</label>
        <input type="date" id="exp-to">
      </div>
      <div class="filter-group">
        <label>Store</label>
        <select id="exp-store"><option value="">All Stores</option></select>
      </div>
      <div class="filter-group">
        <label>Remarks</label>
        <select id="exp-remarks">
          <option value="">All</option>
          <option value="yes">Has remarks</option>
          <option value="no">No remarks</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Sort</label>
        <select id="exp-sort">
          <option value="desc">Newest first</option>
          <option value="asc">Oldest first</option>
        </select>
      </div>
      <button class="btn btn-clear" id="exp-clear">Clear</button>
      <button class="btn btn-resync hidden" id="exp-resync">↻ Re-sync selected (0)</button>
      <div class="filter-total">
        <div class="ft-label"><span id="exp-count">0</span> rows</div>
        <div class="ft-value" id="exp-total">$0.00</div>
      </div>
    </div>

    <div class="table-wrapper">
      <table class="data-table">
        <thead>
          <tr>
            <th class="col-check"><input type="checkbox" id="exp-check-all" title="Select all"></th>
            <th class="col-date">Date</th>
            <th>Expense</th>
            <th class="col-num">Amount</th>
            <th>Store</th>
            <th>Remarks</th>
            <th class="col-sync" title="Synced to sheet">●</th>
            <th class="col-action"></th>
          </tr>
        </thead>
        <tbody id="expense-body"></tbody>
      </table>
    </div>
  </section>

  <!-- ── INCOME tab ─────────────────────────────────────────── -->
  <section id="tab-income" class="tab-content">

    <div class="filter-bar">
      <div class="filter-group">
        <label>From</label>
        <input type="date" id="inc-from">
      </div>
      <div class="filter-group">
        <label>To</label>
        <input type="date" id="inc-to">
      </div>
      <div class="filter-group">
        <label>Dog</label>
        <select id="inc-dog"><option value="">All Dogs</option></select>
      </div>
      <div class="filter-group">
        <label>Source</label>
        <select id="inc-source"><option value="">All Sources</option></select>
      </div>
      <div class="filter-group">
        <label>Type</label>
        <select id="inc-type">
          <option value="">All Types</option>
          <option value="Regular">Regular</option>
          <option value="Tips">Tips</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Sort</label>
        <select id="inc-sort">
          <option value="desc">Newest first</option>
          <option value="asc">Oldest first</option>
        </select>
      </div>
      <button class="btn btn-clear" id="inc-clear">Clear</button>
      <button class="btn btn-resync hidden" id="inc-resync">↻ Re-sync selected (0)</button>
      <div class="filter-total">
        <div class="ft-label"><span id="inc-count">0</span> rows</div>
        <div class="ft-value" id="inc-total">$0.00</div>
      </div>
    </div>

    <div class="table-wrapper">
      <table class="data-table">
        <thead>
          <tr>
            <th class="col-check"><input type="checkbox" id="inc-check-all" title="Select all"></th>
            <th class="col-date">Date</th>
            <th>Dog Name</th>
            <th class="col-num">Income</th>
            <th>Source</th>
            <th>Income Type</th>
            <th class="col-sync" title="Synced to sheet">●</th>
            <th class="col-action"></th>
          </tr>
        </thead>
        <tbody id="income-body"></tbody>
      </table>
    </div>
  </section>

</main>

<!-- ══ MODAL ═══════════════════════════════════════════════════ -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Add Expense</h2>
      <button id="modal-close" class="modal-close" aria-label="Close">×</button>
    </div>

    <!-- Expense form -->
    <form id="expense-form">
      <div class="form-group">
        <label for="f-date">Date</label>
        <input type="date" id="f-date" required>
      </div>
      <div class="form-group">
        <label for="f-expense">Expense</label>
        <input type="text" id="f-expense" required placeholder="e.g. Dog food, Vet visit">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="f-amount">Amount (£)</label>
          <input type="number" id="f-amount" step="0.01" min="0.01" required placeholder="0.00">
        </div>
        <div class="form-group">
          <label for="f-store">Store</label>
          <input type="text" id="f-store" placeholder="Store name" list="store-datalist">
          <datalist id="store-datalist"></datalist>
        </div>
      </div>
      <div class="form-group">
        <label for="f-remarks">Remarks <span class="optional">(optional)</span></label>
        <input type="text" id="f-remarks" placeholder="Any notes…">
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-secondary modal-cancel">Cancel</button>
        <button type="submit" class="btn btn-primary" id="exp-submit">Add Expense</button>
      </div>
    </form>

    <!-- Income form -->
    <form id="income-form" class="hidden">
      <div class="form-row">
        <div class="form-group">
          <label for="i-date">Date</label>
          <input type="date" id="i-date" required>
        </div>
        <div class="form-group">
          <label for="i-itype">Income Type</label>
          <select id="i-itype">
            <option value="Regular">Regular</option>
            <option value="Tips">Tips</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="i-dog">Dog Name</label>
          <input type="text" id="i-dog" required placeholder="Dog's name" list="dog-datalist">
          <datalist id="dog-datalist"></datalist>
        </div>
        <div class="form-group">
          <label for="i-amount">Amount (£)</label>
          <input type="number" id="i-amount" step="0.01" min="0.01" required placeholder="0.00">
        </div>
      </div>
      <div class="form-group">
        <label for="i-source">Source</label>
        <input type="text" id="i-source" required placeholder="e.g. Cash, Bank Transfer" list="source-datalist">
        <datalist id="source-datalist"></datalist>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-secondary modal-cancel">Cancel</button>
        <button type="submit" class="btn btn-primary" id="inc-submit">Add Income</button>
      </div>
    </form>

  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="js/config.js"></script>
<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/sheets.js"></script>
<script src="js/app.js"></script>
</body>
</html>
